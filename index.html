<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Marvel Rivals Random Draft</title>
    <style>
        body { 
            background-image: url('1358385.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f0f0f; 
            
            margin: 0; 
            display: flex; 
            height: 100vh; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            box-sizing: border-box;
        }

        /* Динамическая игровая зона */
        #gameField { 
            flex: 1; 
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
            justify-items: center;
        }

        /* Контейнер слота */
        .slot {
            position: relative;
            /* Жесткое соотношение сторон под вашу рамку 393х699 */
            aspect-ratio: 393 / 699; 
            transition: all 0.3s ease;
            display: block;
        }

        /* Сама желтая рамка (лежит поверх портрета) */
        .frame-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3; 
            pointer-events: none;
            object-fit: fill; 
        }

        /* Окно портрета с жесткой фиксацией краев и идеальной 4-точечной маской */
        .portrait {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #000;
            z-index: 1;
            
            /* Геометрическая маска по вашим точным координатам: (54,81), (346,69), (353,585), (55,640) */
            clip-path: polygon(
                13.7% 11.6%,   /* Левый верхний угол */
                88.0% 9.9%,    /* Правый верхний угол */
                89.8% 83.7%,   /* Правый нижний угол */
                14.0% 91.6%    /* Левый нижний угол */
            );
        }

        .portrait img {
            width: 100%; 
            height: 100%;
            object-fit: cover;
            object-position: center 15%; 
            display: block;
        }

        /* Боковая панель управления */
        .control-panel { 
            width: 280px; 
            background: rgba(22, 22, 22, 0.9); 
            backdrop-filter: blur(5px); 
            padding: 25px; 
            border-left: 3px solid #222; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-container { 
            width: 130%; 
            margin-bottom: 25px; 
            margin-left: -15%; 
        }
        .logo-container img { width: 100%; height: auto; display: block; }
        
        label { margin-top: 10px; color: #ff0000; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        select { 
            width: 100%; padding: 12px; margin-top: 10px; 
            background: #000; color: white; border: 1px solid #ff0000; 
            font-size: 16px; font-weight: bold; text-align: center;
        }
        
        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: auto; 
            background-color: #ff0000; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 18px;
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background-color: #b30000; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #444; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="gameField"></div>

<div class="control-panel">
    <div class="logo-container">
        <img src="kling_20260526_Remove__4411_0-Photoroom.png" alt="Logo">
    </div>
    <label>Количество игроков</label>
    <select id="players">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
    </select>
    <button id="startBtn">START</button>
</div>

<script>
    const heroes = [
        "img_adam-warlock.png", "img_angela.png", "img_black-cat.png", "img_black-panther.png",
        "img_black-widow.png", "img_blade.png", "img_bruce-banner.png", "img_captain-america.png",
        "img_cloak-dagger.png", "img_daredevil.png", "img_deadpool.png", "img_devil-dinosaur.png",
        "img_doctor-strange.png", "img_elsa-bloodstone.png", "img_emma-frost.png", "img_gambit.png",
        "img_groot.png", "img_hawkeye.png", "img_hela.png", "img_human-torch.png",
        "img_invisible-woman.png", "img_iron-fist.png", "img_iron-man.png", "img_jeff-the-land-shark.png",
        "img_loki.png", "img_luna-snow.png", "img_magik.png", "img_magneto.png",
        "img_mantis.png", "img_mister-fantastic.png", "img_moon-knight.png", "img_namor.png",
        "img_peni-parker.png", "img_phoenix.png", "img_psylocke.png", "img_rocket-raccoon.png",
        "img_rogue.png", "img_scarlet-witch.png", "img_spider-man.png", "img_squirrel-girl.png",
        "img_star-lord.png", "img_storm.png", "img_punisher.png", "img_the-thing.png",
        "img_thor.png", "img_ultron.png", "img_venom.png", "img_white-fox.png",
        "img_winter-soldier.png","img_cyclops.png", "img_wolverine.png"
    ];

    const gameField = document.getElementById('gameField');
    const playerSelect = document.getElementById('players');
    const startBtn = document.getElementById('startBtn');

    function renderSlots() {
        gameField.innerHTML = '';
        const count = parseInt(playerSelect.value);
        
        let slotHeight;
        let gap;

        if (count === 1) {
            slotHeight = "95vh";   
            gap = "30px";
            gameField.style.display = 'flex';
            gameField.style.flexDirection = 'row';
        } else if (count === 2) {
            slotHeight = "91vh";   
            gap = "25px";
            gameField.style.display = 'flex';
            gameField.style.flexDirection = 'row';
        } else if (count === 3) {
            slotHeight = "84.5vh"; 
            gap = "20px";
            gameField.style.display = 'flex';
            gameField.style.flexDirection = 'row';
        } else if (count === 4) {
            slotHeight = "70.2vh"; 
            gap = "15px";
            gameField.style.display = 'flex';
            gameField.style.flexDirection = 'row';
        } else if (count === 5) {
            slotHeight = "51.7vh";   
            gap = "10px";
            gameField.style.display = 'flex';
            gameField.style.flexDirection = 'row';
        } else if (count === 6) {
            slotHeight = "49.4vh"; 
            gap = "15px";
            gameField.style.display = 'grid';
            gameField.style.gridTemplateColumns = 'repeat(3, auto)';
        }

        gameField.style.gap = gap;

        for (let i = 0; i < count; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.style.height = slotHeight;
            slot.innerHTML = `
                <img src="image-Photoroom.png" class="frame-img">
                <div class="portrait">
                    <img src="${heroes[Math.floor(Math.random() * heroes.length)]}" class="spin">
                </div>
            `;
            gameField.appendChild(slot);
        }
    }

    playerSelect.onchange = renderSlots;
    window.onload = renderSlots;

    startBtn.onclick = () => {
        const imgs = document.querySelectorAll('.spin');
        if (imgs.length === 0) return;

        startBtn.disabled = true;
        playerSelect.disabled = true;

        let elapsed = 0;
        let delay = 50; 
        const totalDuration = 2000; // Время уменьшено до 2 секунд

        // Перемешиваем и выбираем строго уникальных персонажей
        let finalHeroes = [...heroes].sort(() => 0.5 - Math.random()).slice(0, imgs.length);

        function runSpin() {
            // Если время вышло — принудительно ставим уникальных и выходим
            if (elapsed >= totalDuration) {
                imgs.forEach((img, index) => {
                    img.src = finalHeroes[index];
                });
                startBtn.disabled = false;
                playerSelect.disabled = false;
                return;
            }

            // Пока крутится — показываем случайный хаос
            imgs.forEach((img) => {
                img.src = heroes[Math.floor(Math.random() * heroes.length)];
            });

            elapsed += delay;

            // Замедление начинается после 1.2 секунды (1200мс)
            if (elapsed > 1200) {
                delay += 35; 
            }

            setTimeout(runSpin, delay);
        }

        runSpin();
    };
</script>
</body>
</html>
