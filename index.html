    <style>
        body {
            background-color: #0f0f0f;
            margin: 0;
            padding: 10px;
            padding-bottom: 85px; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        .main-layout { display: flex; gap: 15px; flex-grow: 1; overflow: hidden; padding: 10px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            flex-grow: 1;
            height: 100%;
        }

        .character-card {
            background-color: #222;
            border: 2px solid #444;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: border 0.1s ease;
        }

        .character-card.selected { 
            border: 4px solid #ff0000; 
            box-shadow: 0 0 20px #ff0000;
            z-index: 2;
        }

        .character-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.8; }
        .character-card.selected img { opacity: 1; }
        
        .control-panel {
            width: 250px; 
            padding: 20px; 
            background-color: #1a1a1a;
            border: 2px solid #333; 
            display: flex; 
            flex-direction: column;
        }

        .logo-container { 
            width: 130%; 
            margin-bottom: 20px; 
            margin-left: -15%; /* Смещение для центрирования при увеличении */
        }
        .logo-container img { width: 100%; height: auto; }

        .control-panel label { margin-bottom: 15px; font-weight: bold; color: #ff0000; display: block; }
        .control-panel select { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; color: white; border: 1px solid #ff0000; }
        .control-panel button { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .control-panel button:hover { background: #b30000; }
    </style>
</head>

            </div>
            <label for="players">Количество игроков</label>
            <select id="players">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            </select>
            <button id="startBtn">Start</button>
        </div>
    </div>

    <script>
        const cards = Array.from(document.querySelectorAll('.character-card'));
        const playerSelect = document.getElementById('players');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', () => {
            const count = parseInt(playerSelect.value);
            let delay = 50; 
            let elapsed = 0;
            const totalDuration = 3000; 

            function runAnimation() {
                cards.forEach(c => c.classList.remove('selected'));
                
                let shuffled = [...cards.keys()].sort(() => 0.5 - Math.random());
                let selectedIndices = shuffled.slice(0, count);
                
                selectedIndices.forEach(i => cards[i].classList.add('selected'));

                elapsed += delay;
                if (elapsed > 2000) { delay += 50; }

                if (elapsed < totalDuration) {
                    setTimeout(runAnimation, delay);
                }
            }
            runAnimation();
        });
    </script>
